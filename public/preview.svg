<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Excel sequence generator preview</title>
  <desc id="desc">A preview of a spreadsheet sequence generator with formulas and generated labels.</desc>
  <rect width="1200" height="800" fill="#f8fafc"/>
  <rect x="64" y="54" width="1072" height="692" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="64" y="54" width="1072" height="72" rx="18" fill="#0f172a"/>
  <text x="104" y="99" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="25" font-weight="700">Excel Sequence Generator</text>
  <rect x="849" y="78" width="94" height="22" rx="11" fill="#22c55e"/>
  <rect x="961" y="78" width="94" height="22" rx="11" fill="#38bdf8"/>
  <rect x="1084" y="78" width="42" height="22" rx="11" fill="#f59e0b"/>
  <rect x="104" y="164" width="438" height="520" rx="14" fill="#f1f5f9" stroke="#d7e0ea"/>
  <text x="136" y="210" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="27" font-weight="700">Sequence Settings</text>
  <text x="136" y="257" fill="#475569" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17">Prefix</text>
  <rect x="136" y="274" width="346" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="158" y="306" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">Account</text>
  <text x="136" y="359" fill="#475569" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17">Start, count, step</text>
  <rect x="136" y="376" width="100" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="258" y="376" width="122" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="402" y="376" width="80" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="171" y="408" text-anchor="middle" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">1</text>
  <text x="319" y="408" text-anchor="middle" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">400000</text>
  <text x="442" y="408" text-anchor="middle" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">1</text>
  <text x="136" y="463" fill="#475569" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17">Separator and padding</text>
  <rect x="136" y="480" width="164" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="322" y="480" width="160" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="218" y="512" text-anchor="middle" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">none</text>
  <text x="402" y="512" text-anchor="middle" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">0</text>
  <rect x="136" y="574" width="346" height="58" rx="10" fill="#11885a"/>
  <text x="309" y="610" text-anchor="middle" fill="#ffffff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">Generate formulas</text>
  <rect x="586" y="164" width="450" height="164" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="620" y="209" fill="#065f46" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700">Excel 365 formula</text>
  <rect x="620" y="234" width="382" height="54" rx="8" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="644" y="268" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">="Account"&amp;SEQUENCE(400000)</text>
  <rect x="586" y="356" width="450" height="164" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="620" y="401" fill="#1d4ed8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700">Legacy formula</text>
  <rect x="620" y="426" width="382" height="54" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="644" y="460" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">="Account"&amp;ROW(A1)</text>
  <rect x="586" y="548" width="450" height="136" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="620" y="592" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700">Preview</text>
  <text x="620" y="632" fill="#334155" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Account1, Account2, Account3...</text>
  <path d="M104 714h1032" stroke="#e2e8f0"/>
  <text x="104" y="731" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16">Copy-ready formulas. Preview limits protect the browser from huge row counts.</text>
</svg>
